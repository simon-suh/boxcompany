# Jenkins Configuration as Code (JCasC)
# ─────────────────────────────────────────────────────────────────────────────
# Loaded at startup via CASC_JENKINS_CONFIG env var.
# Mounted from the "jenkins-casc" ConfigMap (created by setup.sh).
#
# Credentials are NOT stored here — injected as env vars from the
# jenkins-credentials Secret created by setup.sh.
#
# NOTE: Job creation is intentionally omitted from CasC.
# The boxco-pipeline multibranch job is created manually via the UI on
# first run, or auto-triggered via the GitHub webhook on first push.
# ─────────────────────────────────────────────────────────────────────────────

jenkins:
  systemMessage: "BoxCo CI/CD Pipeline — Managed by JCasC"

  numExecutors: 0
  mode: EXCLUSIVE

  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: true

  remotingSecurity:
    enabled: true

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
        - id: "developer"
          password: "${JENKINS_DEV_PASSWORD}"

  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Full access"
            permissions:
              - "Overall/Administer"
            entries:
              - user: "admin"
          - name: "developer"
            description: "Can trigger and view builds"
            permissions:
              - "Overall/Read"
              - "Job/Build"
              - "Job/Read"
              - "Job/Workspace"
            entries:
              - user: "developer"

  clouds:
    - kubernetes:
        name: "kubernetes"
        serverUrl: "https://kubernetes.default.svc"
        namespace: "jenkins"
        jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
        jenkinsTunnel: "jenkins.jenkins.svc.cluster.local:50000"
        containerCapStr: "10"
        podRetention: "never"

        templates:
          - name: "default"
            label: "jenkins-agent"
            nodeUsageMode: NORMAL
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest"
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
                command: ""
                args: ""

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-credentials"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub — BoxCo repo (read + write for manifest updates)"

unclassified:
  location:
    url: "http://localhost:8082"
    adminAddress: "admin@boxcompany.local"

  gitHubConfiguration:
    apiRateLimitChecker: ThrottleForNormalize

  githubPluginConfig:
    hookUrl: "http://localhost:8082/github-webhook/"
    configs:
      - apiUrl: "https://api.github.com"
        credentialsId: "github-credentials"
        name: "GitHub"
        manageHooks: false

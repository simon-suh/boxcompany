# Jenkins Configuration as Code (JCasC)
# ─────────────────────────────────────────────────────────────────────────────
# Loaded at startup via CASC_JENKINS_CONFIG env var.
# Mounted from the "jenkins-casc" ConfigMap (created by setup.sh).
#
# Credentials are NOT stored here — injected as env vars from the
# jenkins-credentials Secret created by setup.sh.
# ─────────────────────────────────────────────────────────────────────────────

jenkins:
  systemMessage: "BoxCo CI/CD Pipeline — Managed by JCasC"

  numExecutors: 0   # All builds run on ephemeral Kubernetes agent pods
  mode: EXCLUSIVE

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
        - id: "developer"
          password: "${JENKINS_DEV_PASSWORD}"

  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Full access"
            permissions:
              - "Overall/Administer"
            entries:
              - user: "admin"
          - name: "developer"
            description: "Can trigger and view builds"
            permissions:
              - "Overall/Read"
              - "Job/Build"
              - "Job/Read"
              - "Job/Workspace"
            entries:
              - user: "developer"

  clouds:
    - kubernetes:
        name: "kubernetes"
        serverUrl: "https://kubernetes.default.svc"
        namespace: "jenkins"
        jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
        jenkinsTunnel: "jenkins.jenkins.svc.cluster.local:50000"
        containerCapStr: "10"
        podRetention: "never"

        templates:
          # Lightweight agent for branch scans and non-build jobs
          - name: "default"
            label: "jenkins-agent"
            nodeUsageMode: NORMAL
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest"
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
                command: ""
                args: ""

          # NOTE: The "boxco-builder" build pod (dind + builder) is defined
          # inline in the Jenkinsfile so it is versioned alongside pipeline code.

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-credentials"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub — BoxCo repo (read + write for manifest updates)"

unclassified:
  location:
    url: "http://jenkins.jenkins.svc.cluster.local:8080"
    adminAddress: "admin@boxcompany.local"

  gitHubConfiguration:
    apiRateLimitChecker: ThrottleForNormalize

jobs:
  - script: >
      multibranchPipelineJob('boxco-pipeline') {
        displayName('BoxCo Services Pipeline')
        description('Builds all branches; updates main manifests; Argo CD deploys.')

        branchSources {
          github {
            id('boxco-github')
            repoOwner('simon-suh')
            repository('boxcompany')
            scanCredentialsId('github-credentials')
            buildOriginBranch(true)
            buildOriginBranchWithPR(false)
            buildOriginPRMerge(false)
          }
        }

        orphanedItemStrategy {
          discardOldItems {
            numToKeep(5)
          }
        }

        triggers {
          // Webhooks (via smee.io) are the primary trigger — instant on push.
          // periodic() is a daily fallback in case a webhook is missed.
          periodic(1440)
        }
      }

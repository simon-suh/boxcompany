apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      securityContext:
        fsGroup: 1000
        runAsUser: 1000

      # ── Init container: installs plugins before Jenkins starts ──────────────
      # Reads jenkins/plugins.txt from the jenkins-plugins ConfigMap.
      # Installs into the shared PVC so the main container picks them up on boot.
      initContainers:
        - name: install-plugins
          image: jenkins/jenkins:lts
          command:
            - jenkins-plugin-cli
            - --plugin-file=/plugins/plugins.txt
            - --plugins-dir=/var/jenkins_home/plugins
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: plugins
              mountPath: /plugins
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          ports:
            - name: http
              containerPort: 8080
            - name: agent
              containerPort: 50000

          env:
            # Skip the setup wizard — CasC handles all configuration
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false"

            # Tell JCasC where to find the config file (mounted from ConfigMap)
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_casc/jenkins.yaml

            # Credentials injected from the jenkins-credentials Secret
            # (created by setup.sh — never committed to git)
            - name: JENKINS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: admin-password
            - name: JENKINS_DEV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: dev-password
            - name: GITHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: github-username
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: github-token

          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: casc
              mountPath: /var/jenkins_casc

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1500m"

          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15

          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-home
        # CasC config — sourced from jenkins/k8s/jenkins-casc.yaml via setup.sh
        - name: casc
          configMap:
            name: jenkins-casc
        # Plugins list — sourced from jenkins/plugins.txt via setup.sh
        - name: plugins
          configMap:
            name: jenkins-plugins

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-api
  namespace: boxco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sales-api
  template:
    metadata:
      labels:
        app: sales-api
    spec:
      containers:
      - name: sales-api
        image: 192.168.49.2:30500/sales-api:scenario-2
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "sales"
        - name: DB_USER
          value: "boxco"
        - name: DB_PASSWORD
          value: "password"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: SCENARIO
          value: "2"
        - name: INVENTORY_API_URL
          value: "http://inventory-api:3003"
---
apiVersion: v1
kind: Service
metadata:
  name: sales-api
  namespace: boxco
  labels:
    app: sales-api
spec:
  type: NodePort
  ports:
  - name: http
    port: 3001
    targetPort: 3001
    nodePort: 30001
  selector:
    app: sales-api

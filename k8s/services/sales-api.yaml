apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-api
  namespace: boxco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sales-api
  template:
    metadata:
      labels:
        app: sales-api
    spec:
      containers:
      - name: sales-api
        image: 192.168.49.2:30500/sales-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: "postgresql://boxco_user:boxco_pass@postgres:5432/boxco_db"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: sales-api
  namespace: boxco
  labels:
    app: sales-api
spec:
  type: NodePort
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
  selector:
    app: sales-api

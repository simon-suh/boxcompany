apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: boxco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
      - name: inventory-api
        image: 192.168.49.2:30500/inventory-api:scenario-1
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
        env:
        - name: DYNAMODB_ENDPOINT
          value: "http://dynamodb:8000"
        - name: DYNAMODB_REGION
          value: "us-east-1"
        - name: AWS_ACCESS_KEY_ID
          value: "local"
        - name: AWS_SECRET_ACCESS_KEY
          value: "local"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: SCENARIO
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: boxco
  labels:
    app: inventory-api
spec:
  type: NodePort
  ports:
  - name: http
    port: 3003
    targetPort: 3003
    nodePort: 30003
  selector:
    app: inventory-api

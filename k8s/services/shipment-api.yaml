apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment-api
  namespace: boxco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipment-api
  template:
    metadata:
      labels:
        app: shipment-api
    spec:
      containers:
      - name: shipment-api
        image: 192.168.49.2:30500/shipment-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        env:
        - name: AWS_REGION
          value: "us-west-2"
        - name: DYNAMODB_ENDPOINT
          value: "http://dynamodb:8000"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: shipment-api
  namespace: boxco
spec:
  type: NodePort
  selector:
    app: shipment-api
  ports:
  - name: http
    port: 3002
    targetPort: 3002
    nodePort: 30002
